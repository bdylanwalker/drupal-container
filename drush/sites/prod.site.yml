  db:
    default:
      default:
        driver: mysql
        host: ${env.PROD_DB_HOST}
        database: drupal
        username: mysqladmin
        password: ${env.PROD_DB_PASSWORD}
        port: 3306
  command:
    sql:
      dump:
        options:
          extra-dump: '--ssl-mode=REQUIRED'