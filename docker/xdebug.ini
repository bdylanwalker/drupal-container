; XDebug 3 configuration.
;
; The extension is installed but DISABLED by default so production containers
; carry no performance penalty.
;
; To enable, set the XDEBUG_MODE environment variable on the container:
;   XDEBUG_MODE=develop,debug
;
; XDebug 3 reads XDEBUG_MODE from the environment and overrides this ini value,
; so no image rebuild is required.

xdebug.mode = off

; ---- Debug connection (used when XDEBUG_MODE includes "debug") ----
; host.docker.internal resolves to the Docker host on Mac and Windows.
; On Linux you may need to use the host's gateway IP instead.
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003

; Trigger a debug session on every request (vs. requiring a cookie/query param).
xdebug.start_with_request = yes

xdebug.idekey = PHPSTORM

; Suppress the log file in production; enable locally if you need to diagnose
; connection issues (xdebug.log_level = 7 for verbose).
xdebug.log_level = 0