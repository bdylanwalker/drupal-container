; Memory
memory_limit = 256M

; File uploads
upload_max_filesize = 64M
post_max_size = 64M

; Execution limits
max_execution_time = 300
max_input_time = 300
max_input_vars = 3000

; Timezone
date.timezone = UTC

; Realpath cache (important for Drupal performance)
realpath_cache_size = 4096K
realpath_cache_ttl = 3600

; OPcache — tuned for immutable container images (no need to revalidate timestamps)
opcache.enable = 1
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 8000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1
opcache.enable_cli = 0

; APCu — user-space memory cache used by Drupal for e.g. module data
apc.enabled = 1
apc.shm_size = 32M
apc.ttl = 7200