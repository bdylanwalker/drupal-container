server {
    listen 80 default_server;
    server_name _;

    root /var/www/html/web;
    index index.php;

    # Health check endpoint — handled entirely by nginx, no PHP involved.
    # Used by the ACA readiness probe; avoids Drupal's trusted-host check.
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Drupal clean URLs
    location / {
        try_files $uri /index.php?$query_string;
    }

    # PHP-FPM handler
    location ~ \.php$ {
        # Mitigate https://httpoxy.org/
        fastcgi_param HTTP_PROXY "";

        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Image styles: try file first, then let Drupal generate it
    location ~ ^/sites/.*/files/styles/ {
        try_files $uri @drupal;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static assets with caching headers
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        log_not_found off;
    }

    # Block access to sensitive paths
    location ~* ^/(?:\.git|vendor|config) {
        deny all;
        return 404;
    }

    # Block access to sensitive files
    location ~* \.(htaccess|engine|inc|install|make|module|profile|po|sh|sql|theme|twig|tpl\.php|xtmpl|yml)$ {
        deny all;
        return 404;
    }

    location ~* /\. {
        deny all;
        return 404;
    }

    location @drupal {
        rewrite ^ /index.php last;
    }
}