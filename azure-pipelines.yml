trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

# ---------------------------------------------------------------------------
# Variable groups and pipeline variables.
#
# Variable group "drupal-prod-secrets" (Pipelines → Library) must contain:
#   mysqlAdminPassword  — marked secret
#   drupalHashSalt      — marked secret
#
# ADO Environment "drupal-prod" must be created (Pipelines → Environments)
# and configured with an approval check to gate production deployments.
# ---------------------------------------------------------------------------
variables:
  - group: drupal-prod-secrets
  - name: azureServiceConnection
    value: azure-prod
  - name: resourceGroup
    value: drupal-prod-rg
  - name: stagingResourceGroup
    value: drupal-staging-rg
  - name: location
    value: centralus
  - name: acrName
    value: drupalacr
  # Set to 'maintenance' when queuing manually for breaking upgrades.
  # 'blueGreen' (default) holds traffic on the old revision until migrations succeed.
  # 'maintenance' enables Drupal maintenance mode, cuts traffic immediately, then
  # runs migrations and disables maintenance mode — use for major version upgrades
  # or any drush deploy that is not backwards compatible with the running code.
  - name: deployMode
    value: blueGreen

stages:

  # -------------------------------------------------------------------------
  # Stage 1: Build the Docker image and push it to ACR.
  # -------------------------------------------------------------------------
  - stage: Build
    displayName: Build and push image
    jobs:
      - job: BuildImage
        displayName: az acr build
        steps:
          - task: AzureCLI@2
            displayName: Ensure ACR exists
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr show \
                  --name $(acrName) \
                  --resource-group $(resourceGroup) \
                  --output none 2>/dev/null || \
                az acr create \
                  --name $(acrName) \
                  --resource-group $(resourceGroup) \
                  --location $(location) \
                  --sku Basic \
                  --admin-enabled false

          - task: AzureCLI@2
            displayName: Build and push to ACR
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr build \
                  --registry $(acrName) \
                  --image drupal:$(Build.BuildId) \
                  --image drupal:latest \
                  --file docker/Dockerfile \
                  .

  # -------------------------------------------------------------------------
  # Stage 2: Deploy staging environment.
  #
  # Staging shares the prod MySQL server but uses a separate database
  # (drupal_staging), separate ACA environment, and separate storage.
  # The staging DB is seeded from prod on every pipeline run.
  # -------------------------------------------------------------------------
  - stage: DeployStaging
    displayName: Deploy staging
    dependsOn: Build
    jobs:
      - job: Staging
        displayName: Deploy, seed, and validate staging
        timeoutInMinutes: 40
        steps:
          - task: AzureCLI@2
            displayName: Ensure staging resource group exists
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az group create \
                  --name $(stagingResourceGroup) \
                  --location $(location) \
                  --output none

          # Pre-create the managed identity and grant AcrPull BEFORE deploying
          # the ACA app, so the image pull succeeds on first run.
          - task: AzureCLI@2
            displayName: Pre-create staging identity and grant AcrPull
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                az identity create \
                  --name drupal-staging-aca-identity \
                  --resource-group $(stagingResourceGroup) \
                  --location $(location) \
                  --output none

                STAGING_PRINCIPAL=$(az identity show \
                  --name drupal-staging-aca-identity \
                  --resource-group $(stagingResourceGroup) \
                  --query principalId --output tsv)

                ACR_ID=$(az acr show \
                  --name $(acrName) \
                  --resource-group $(resourceGroup) \
                  --query id --output tsv)

                az role assignment create \
                  --assignee-object-id "$STAGING_PRINCIPAL" \
                  --assignee-principal-type ServicePrincipal \
                  --role 7f951dda-4ed3-4680-a7ca-43fe172d538d \
                  --scope "$ACR_ID" 2>/dev/null || true

          - task: AzureCLI@2
            displayName: Deploy staging Bicep
            env:
              MYSQL_ADMIN_PASSWORD: $(mysqlAdminPassword)
              DRUPAL_HASH_SALT: $(drupalHashSalt)
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                MYSQL_HOST=$(az mysql flexible-server list \
                  --resource-group $(resourceGroup) \
                  --query "[0].fullyQualifiedDomainName" \
                  --output tsv)

                az deployment group create \
                  --resource-group $(stagingResourceGroup) \
                  --template-file infra/main.bicep \
                  --parameters infra/staging.parameters.json \
                  --parameters \
                    imageTag='$(Build.BuildId)' \
                    revisionSuffix='$(Build.BuildId)' \
                    mysqlAdminPassword="$MYSQL_ADMIN_PASSWORD" \
                    drupalHashSalt="$DRUPAL_HASH_SALT" \
                    mysqlHostOverride="$MYSQL_HOST" \
                  --mode Incremental

          - task: AzureCLI@2
            displayName: Seed staging database from prod
            env:
              MYSQL_ADMIN_PASSWORD: $(mysqlAdminPassword)
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                MYSQL_HOST=$(az mysql flexible-server list \
                  --resource-group $(resourceGroup) \
                  --query "[0].fullyQualifiedDomainName" \
                  --output tsv)
                MYSQL_SERVER=$(az mysql flexible-server list \
                  --resource-group $(resourceGroup) \
                  --query "[0].name" \
                  --output tsv)

                # Ensure the staging database exists (idempotent).
                az mysql flexible-server db create \
                  --resource-group $(resourceGroup) \
                  --server-name "$MYSQL_SERVER" \
                  --database-name drupal_staging \
                  --charset utf8mb4 \
                  --collation utf8mb4_unicode_ci 2>/dev/null || true

                echo "Seeding drupal_staging from drupal..."
                mysqldump \
                  --host="$MYSQL_HOST" \
                  --user=mysqladmin \
                  --password="$MYSQL_ADMIN_PASSWORD" \
                  --ssl-mode=REQUIRED \
                  --single-transaction \
                  --no-autocommit \
                  --opt -Q \
                  drupal \
                | mysql \
                  --host="$MYSQL_HOST" \
                  --user=mysqladmin \
                  --password="$MYSQL_ADMIN_PASSWORD" \
                  --ssl-mode=REQUIRED \
                  drupal_staging
                echo "Seed complete."

          - task: AzureCLI@2
            displayName: Run staging drush deploy
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                JOB_NAME=$(az deployment group show \
                  --resource-group $(stagingResourceGroup) \
                  --name main \
                  --query "properties.outputs.drushJobName.value" \
                  --output tsv)

                echo "Starting staging drush deploy job: $JOB_NAME"
                EXECUTION_NAME=$(az containerapp job start \
                  --name "$JOB_NAME" \
                  --resource-group $(stagingResourceGroup) \
                  --query name \
                  --output tsv)

                echo "Execution: $EXECUTION_NAME"
                TIMEOUT=600; ELAPSED=0
                while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
                  STATUS=$(az containerapp job execution show \
                    --name "$JOB_NAME" \
                    --resource-group $(stagingResourceGroup) \
                    --job-execution-name "$EXECUTION_NAME" \
                    --query "properties.status" \
                    --output tsv)
                  echo "[${ELAPSED}s] $STATUS"
                  case "$STATUS" in
                    Succeeded) echo "Staging drush deploy succeeded."; exit 0 ;;
                    Failed|Stopped|Degraded) echo "Staging drush deploy failed: $STATUS"; exit 1 ;;
                  esac
                  sleep 10; ELAPSED=$((ELAPSED + 10))
                done
                echo "Timed out."; exit 1

  # -------------------------------------------------------------------------
  # Stage 3: Deploy to production.
  #
  # Requires manual approval via the "drupal-prod" ADO Environment.
  # Create it at Pipelines → Environments and add an Approvals check.
  #
  # deployMode=blueGreen (default):
  #   Traffic held on old revision → new revision warms up → drush deploy
  #   → cut traffic → deactivate old. Zero downtime for backwards-compatible
  #   migrations (the common case for patch/minor Drupal releases).
  #
  # deployMode=maintenance (set manually when queuing the pipeline run):
  #   Maintenance mode enabled on live site → new revision deployed and made
  #   live immediately → drush deploy → maintenance mode disabled. Use for
  #   major Drupal version upgrades or any breaking schema change.
  #   The new revision has a cold cache, so it reads maintenance_mode=1 from
  #   the DB immediately and shows the maintenance page while migrations run.
  # -------------------------------------------------------------------------
  - stage: DeployProd
    displayName: Deploy production ($(deployMode))
    dependsOn: DeployStaging
    jobs:
      - deployment: Deploy
        displayName: Deploy to production
        timeoutInMinutes: 40
        environment: drupal-prod
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                # ----------------------------------------------------------
                # MAINTENANCE MODE ONLY: enable before deploying.
                # ----------------------------------------------------------
                - task: AzureCLI@2
                  displayName: "[maintenance] Enable maintenance mode"
                  condition: eq(variables['deployMode'], 'maintenance')
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      JOB_NAME=$(az deployment group show \
                        --resource-group $(resourceGroup) \
                        --name main \
                        --query "properties.outputs.drushJobName.value" \
                        --output tsv)

                      echo "Enabling Drupal maintenance mode..."
                      EXECUTION_NAME=$(az containerapp job start \
                        --name "$JOB_NAME" \
                        --resource-group $(resourceGroup) \
                        --args /bin/bash -c \
                          'drush state:set system.maintenance_mode 1 --input-format=integer' \
                        --query name --output tsv)

                      TIMEOUT=120; ELAPSED=0
                      while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
                        STATUS=$(az containerapp job execution show \
                          --name "$JOB_NAME" \
                          --resource-group $(resourceGroup) \
                          --job-execution-name "$EXECUTION_NAME" \
                          --query "properties.status" --output tsv)
                        echo "[${ELAPSED}s] $STATUS"
                        case "$STATUS" in
                          Succeeded) echo "Maintenance mode enabled."; exit 0 ;;
                          Failed|Stopped|Degraded) echo "Failed: $STATUS"; exit 1 ;;
                        esac
                        sleep 5; ELAPSED=$((ELAPSED + 5))
                      done
                      echo "Timed out."; exit 1

                # ----------------------------------------------------------
                # Deploy Bicep (both modes).
                # blueGreen: holds traffic on old revision.
                # maintenance: cuts to new revision immediately.
                # ----------------------------------------------------------
                - task: AzureCLI@2
                  displayName: Deploy new prod revision
                  env:
                    MYSQL_ADMIN_PASSWORD: $(mysqlAdminPassword)
                    DRUPAL_HASH_SALT: $(drupalHashSalt)
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail

                      if [ "$(deployMode)" = "blueGreen" ]; then
                        OLD_REVISION=$(az containerapp revision list \
                          --name drupal \
                          --resource-group $(resourceGroup) \
                          --query "[?properties.active && properties.trafficWeight > \`0\`].name | [0]" \
                          --output tsv 2>/dev/null || echo '')
                        echo "Current active revision: ${OLD_REVISION:-none}"
                        echo "##vso[task.setvariable variable=oldRevision]$OLD_REVISION"
                        ACTIVE_REVISION="${OLD_REVISION:-}"
                      else
                        echo "Maintenance mode: cutting to new revision immediately."
                        echo "##vso[task.setvariable variable=oldRevision]"
                        ACTIVE_REVISION=""
                      fi

                      az deployment group create \
                        --resource-group $(resourceGroup) \
                        --template-file infra/main.bicep \
                        --parameters infra/main.parameters.json \
                        --parameters \
                          imageTag='$(Build.BuildId)' \
                          revisionSuffix='$(Build.BuildId)' \
                          activeRevisionName="$ACTIVE_REVISION" \
                          mysqlAdminPassword="$MYSQL_ADMIN_PASSWORD" \
                          drupalHashSalt="$DRUPAL_HASH_SALT" \
                        --mode Incremental

                # ----------------------------------------------------------
                # BLUE/GREEN ONLY: wait for new revision before migrating.
                # ----------------------------------------------------------
                - task: AzureCLI@2
                  displayName: "[blueGreen] Wait for new revision to be healthy"
                  condition: eq(variables['deployMode'], 'blueGreen')
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      NEW_REVISION="drupal--$(Build.BuildId)"
                      echo "Waiting for revision $NEW_REVISION..."
                      TIMEOUT=300; ELAPSED=0
                      while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
                        STATE=$(az containerapp revision show \
                          --name drupal \
                          --resource-group $(resourceGroup) \
                          --revision "$NEW_REVISION" \
                          --query "properties.runningState" \
                          --output tsv 2>/dev/null || echo 'Unknown')
                        echo "[${ELAPSED}s] runningState: $STATE"
                        [ "$STATE" = "Running" ] && { echo "Revision is running."; exit 0; }
                        [ "$STATE" = "Failed" ] && { echo "Revision failed to start."; exit 1; }
                        sleep 10; ELAPSED=$((ELAPSED + 10))
                      done
                      echo "Timed out waiting for new revision."; exit 1

                # ----------------------------------------------------------
                # Snapshot DB and record rollback info (both modes).
                # Runs before drush deploy so you always have a clean restore
                # point. Snapshot name: pre-deploy-<BuildId>.
                # Publishes a rollback-info artifact with the revision to
                # reactivate and the snapshot name to restore if needed.
                # ----------------------------------------------------------
                - task: AzureCLI@2
                  displayName: Snapshot DB before migrations
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      MYSQL_SERVER=$(az mysql flexible-server list \
                        --resource-group $(resourceGroup) \
                        --query "[0].name" --output tsv)
                      BACKUP_NAME="pre-deploy-$(Build.BuildId)"

                      echo "Creating on-demand backup: $BACKUP_NAME"
                      az mysql flexible-server backup create \
                        --resource-group $(resourceGroup) \
                        --name "$MYSQL_SERVER" \
                        --backup-name "$BACKUP_NAME"
                      echo "Backup complete: $BACKUP_NAME"

                - task: Bash@3
                  displayName: Publish rollback info artifact
                  inputs:
                    targetType: inline
                    script: |
                      mkdir -p $(Agent.TempDirectory)/rollback-info
                      cat > $(Agent.TempDirectory)/rollback-info/rollback.txt <<EOF
                      build_id=$(Build.BuildId)
                      old_revision=$(oldRevision)
                      db_snapshot=pre-deploy-$(Build.BuildId)
                      resource_group=$(resourceGroup)
                      deploy_mode=$(deployMode)
                      EOF
                      cat $(Agent.TempDirectory)/rollback-info/rollback.txt

                - task: PublishPipelineArtifact@1
                  displayName: Upload rollback info
                  inputs:
                    targetPath: $(Agent.TempDirectory)/rollback-info
                    artifact: rollback-info

                # ----------------------------------------------------------
                # Run drush deploy (both modes).
                # blueGreen: old revision still live during this step.
                # maintenance: new revision is live but showing maintenance page.
                # ----------------------------------------------------------
                - task: AzureCLI@2
                  displayName: Run drush deploy
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail

                      JOB_NAME=$(az deployment group show \
                        --resource-group $(resourceGroup) \
                        --name main \
                        --query "properties.outputs.drushJobName.value" \
                        --output tsv)

                      echo "Starting prod drush deploy job: $JOB_NAME"
                      EXECUTION_NAME=$(az containerapp job start \
                        --name "$JOB_NAME" \
                        --resource-group $(resourceGroup) \
                        --query name \
                        --output tsv)

                      TIMEOUT=600; ELAPSED=0
                      while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
                        STATUS=$(az containerapp job execution show \
                          --name "$JOB_NAME" \
                          --resource-group $(resourceGroup) \
                          --job-execution-name "$EXECUTION_NAME" \
                          --query "properties.status" \
                          --output tsv)
                        echo "[${ELAPSED}s] $STATUS"
                        case "$STATUS" in
                          Succeeded) echo "drush deploy succeeded."; break ;;
                          Failed|Stopped|Degraded) echo "drush deploy failed: $STATUS"; exit 1 ;;
                        esac
                        sleep 10; ELAPSED=$((ELAPSED + 10))
                      done

                # ----------------------------------------------------------
                # BLUE/GREEN ONLY: cut traffic after migrations succeed.
                # If this step is reached, migrations were backwards-compatible
                # and the old revision served users safely throughout.
                # ----------------------------------------------------------
                - task: AzureCLI@2
                  displayName: "[blueGreen] Cut traffic to new revision"
                  condition: eq(variables['deployMode'], 'blueGreen')
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      NEW_REVISION="drupal--$(Build.BuildId)"

                      az containerapp ingress traffic set \
                        --name drupal \
                        --resource-group $(resourceGroup) \
                        --revision-weight "$NEW_REVISION=100"
                      echo "Traffic cut to $NEW_REVISION."

                      OLD_REVISION="$(oldRevision)"
                      if [[ -n "$OLD_REVISION" && "$OLD_REVISION" != "$NEW_REVISION" ]]; then
                        az containerapp revision deactivate \
                          --name drupal \
                          --resource-group $(resourceGroup) \
                          --revision "$OLD_REVISION"
                        echo "Deactivated: $OLD_REVISION"
                      fi

                # ----------------------------------------------------------
                # MAINTENANCE MODE ONLY: disable after migrations succeed.
                # Runs even if drush deploy failed so the site is never left
                # stuck in maintenance mode by a pipeline failure.
                # ----------------------------------------------------------
                - task: AzureCLI@2
                  displayName: "[maintenance] Disable maintenance mode"
                  condition: and(always(), eq(variables['deployMode'], 'maintenance'))
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      JOB_NAME=$(az deployment group show \
                        --resource-group $(resourceGroup) \
                        --name main \
                        --query "properties.outputs.drushJobName.value" \
                        --output tsv)

                      echo "Disabling Drupal maintenance mode..."
                      EXECUTION_NAME=$(az containerapp job start \
                        --name "$JOB_NAME" \
                        --resource-group $(resourceGroup) \
                        --args /bin/bash -c \
                          'drush state:set system.maintenance_mode 0 --input-format=integer' \
                        --query name --output tsv)

                      TIMEOUT=120; ELAPSED=0
                      while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
                        STATUS=$(az containerapp job execution show \
                          --name "$JOB_NAME" \
                          --resource-group $(resourceGroup) \
                          --job-execution-name "$EXECUTION_NAME" \
                          --query "properties.status" --output tsv)
                        echo "[${ELAPSED}s] $STATUS"
                        case "$STATUS" in
                          Succeeded) echo "Site is live."; exit 0 ;;
                          Failed|Stopped|Degraded) echo "Failed to disable maintenance mode: $STATUS"; exit 1 ;;
                        esac
                        sleep 5; ELAPSED=$((ELAPSED + 5))
                      done
                      echo "Timed out."; exit 1